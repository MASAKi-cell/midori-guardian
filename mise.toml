[tools]
node = "24.13.0"
pnpm = "11.8.0"
ruff = "latest"

[env]
AWS_PROFILE = "company-dev"
AWS_REGION  = "ap-northeast-1"
THING_NAME  = "midori-pi-001"
POLICY_NAME = "MidoriPiPolicy"
SECRET_ID   = "iot/midori-pi-001/certificate"
CERT_TMP    = "/tmp/midori-cert-output.json"


[tasks.lint]
run = "pnpm exec turbo run lint"
description = "Biome で TypeScript を lint"

[tasks.format]
run = "pnpm exec biome format --write ."
description = "Biome で TypeScript を format"

[tasks.check]
run = "pnpm exec biome check --write ."
description = "Biome で lint + format を一括実行"

[tasks.lint-py]
run = "ruff check pi/"
description = "ruff で Python を lint"

[tasks.format-py]
run = "ruff format pi/"
description = "ruff で Python を format"

[tasks.build]
run = "pnpm exec turbo run build"
description = "TypeScript をコンパイル"

[tasks.test]
run = "pnpm exec turbo run test"
description = "Jest テストを実行"

[tasks.synth]
run = "pnpm -C cdk exec cdk --profile {{env.AWS_PROFILE}} synth"
description = "CDK スタックを CloudFormation テンプレートに合成"

[tasks.diff]
run = "pnpm -C cdk exec cdk --profile {{env.AWS_PROFILE}} diff"
description = "デプロイ前にスタックの差分を確認"

[tasks.deploy]
run = "pnpm -C cdk exec cdk deploy --profile {{env.AWS_PROFILE}}"
description = "全スタックをデプロイ"

[tasks.bootstrap]
run = "pnpm -C cdk exec cdk bootstrap"
description = "CDK ツールキットを初期セットアップ"

# ── IoT 初回セットアップ ──────────────────────────────────────────────────────

[tasks."iot:cert-create"]
description = "証明書を発行して Secrets Manager に格納し Thing・Policy にアタッチ"
run = """
set -euo pipefail
echo "--- 1. 証明書発行 ---"
aws iot create-keys-and-certificate \
  --set-as-active \
  --profile {{env.AWS_PROFILE}} \
  --region  {{env.AWS_REGION}} > {{env.CERT_TMP}}

echo "--- 2. Secrets Manager に格納 ---"
aws secretsmanager put-secret-value \
  --secret-id     "{{env.SECRET_ID}}" \
  --secret-string file://{{env.CERT_TMP}} \
  --profile {{env.AWS_PROFILE}} \
  --region  {{env.AWS_REGION}}

echo "--- 3. Thing・Policy にアタッチ ---"
CERT_ARN=$(jq -r '.certificateArn' {{env.CERT_TMP}})
aws iot attach-thing-principal \
  --thing-name {{env.THING_NAME}} \
  --principal  "$CERT_ARN" \
  --profile {{env.AWS_PROFILE}} \
  --region  {{env.AWS_REGION}}
aws iot attach-policy \
  --policy-name {{env.POLICY_NAME}} \
  --target      "$CERT_ARN" \
  --profile {{env.AWS_PROFILE}} \
  --region  {{env.AWS_REGION}}

echo "完了: 証明書は {{env.CERT_TMP}} に保存されています"
"""

[tasks."iot:cert-transfer"]
description = "証明書を Pi に転送（PI_IP 環境変数が必要: PI_IP=x.x.x.x mise run iot:cert-transfer）"
run = "scp {{env.CERT_TMP}} pi@${PI_IP}:~/certs/"
